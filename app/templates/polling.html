{% extends "base.html" %}

{% block title %}Обработка - CS2 Анализатор Античита{% endblock %}

{% block content %}
<div class="progress-container">
    <h1>Анализ выполняется...</h1>
    <p>Матч обрабатывается в фоновом режиме. Страница обновится автоматически.</p>
    <div class="polling-progress">
        <div class="polling-bar" id="pollingBar"></div>
    </div>
    <p id="pollingStatus">Инициализация...</p>
</div>
<script>
const redirectUrl = "{{ redirect_url }}";
const jobId = "{{ job_id }}";
const statusEl = document.getElementById('pollingStatus');
const barEl = document.getElementById('pollingBar');
let progress = 5;

const msgs = [
    'Загрузка данных...',
    'Извлечение признаков...',
    'Анализ поведения...',
    'Оценка рисков...',
    'Финализация...'
];

function setProgress(value) {
    progress = Math.min(value, 95);
    barEl.style.width = progress + '%';
    const idx = Math.min(Math.floor(progress / 20), msgs.length - 1);
    statusEl.textContent = msgs[idx];
}

setProgress(5);

async function checkJobAndRedirect() {
    try {
        const resp = await fetch('/job/' + jobId);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();

        if (data.status === 'done') {
            setProgress(100);
            statusEl.textContent = 'Готово! Переход к отчету...';
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 300);
            return true;
        } else if (data.status === 'error') {
            statusEl.textContent = 'Ошибка: ' + ((data.result && (data.result.message || data.result.error)) || 'Неизвестная ошибка');
            barEl.style.background = '#e74c3c';
            return true;
        }
        return false;
    } catch (e) {
        statusEl.textContent = 'Ошибка соединения: ' + e.message;
        return true;
    }
}

async function pollJob() {
    const done = await checkJobAndRedirect();
    if (done) return;

    // Still processing — grow progress but never reset
    const increment = Math.random() * 2 + 0.5;
    setProgress(progress + increment);

    setTimeout(pollJob, 2000);
}

// Check immediately on load, then start polling
checkJobAndRedirect().then(done => {
    if (!done) {
        setTimeout(pollJob, 1000);
    }
});
</script>
{% endblock %}
