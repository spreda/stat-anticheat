{% extends "base.html" %}

{% block title %}Обработка - CS2 Анализатор Античита{% endblock %}

{% block content %}
<style>
.spinner {
    border: 4px solid #e0e0e0;
    border-top: 4px solid #3498db;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    animation: spin 0.8s linear infinite;
    margin: 40px auto;
}
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
#elapsed { color: #888; font-size: 0.85em; margin-top: 8px; }
</style>
<div class="progress-container">
    <h1>Анализ выполняется...</h1>
    <p>Матч обрабатывается в фоновом режиме. Страница обновится автоматически.</p>
    <div class="spinner"></div>
    <p id="pollingStatus">Запуск анализа...</p>
    <p id="elapsed"></p>
</div>
<script>
const redirectUrl = "{{ redirect_url }}";
const jobId = "{{ job_id }}";
const statusEl = document.getElementById('pollingStatus');
const elapsedEl = document.getElementById('elapsed');
const startTime = Date.now();

function fmtElapsed(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    return m > 0 ? (m + 'м ' + (s % 60) + 'с') : (s + 'с');
}

function updateElapsed() {
    elapsedEl.textContent = 'Прошло: ' + fmtElapsed(Date.now() - startTime);
}

async function checkJobAndRedirect() {
    try {
        const resp = await fetch('/job/' + jobId);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();

        if (data.status === 'done') {
            statusEl.textContent = 'Готово! Переход к отчету...';
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 300);
            return true;
        } else if (data.status === 'error') {
            statusEl.textContent = 'Ошибка: ' + ((data.result && (data.result.message || data.result.error)) || 'Неизвестная ошибка');
            return true;
        }

        statusEl.textContent = data.status === 'pending' ? 'Парсинг демо-файла...' : 'Анализ данных...';
        updateElapsed();
        return false;
    } catch (e) {
        statusEl.textContent = 'Ошибка соединения: ' + e.message;
        return true;
    }
}

async function pollJob() {
    const done = await checkJobAndRedirect();
    if (done) return;
    setTimeout(pollJob, 2000);
}

checkJobAndRedirect().then(done => {
    if (!done) {
        updateElapsed();
        setInterval(updateElapsed, 1000);
        setTimeout(pollJob, 1000);
    }
});
</script>
{% endblock %}
